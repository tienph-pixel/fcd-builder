[build]
  command = "npm run build"
  publish = "dist"

# Internal apps — serve directly, bypass Astro catch-all
[[redirects]]
  from = "/hub"
  to = "/hub/index.html"
  status = 200
  force = true


[[redirects]]
  from = "/worker"
  to = "/worker/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/receipt"
  to = "/receipt/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/track"
  to = "/track/index.html"
  status = 200
  force = true

# Astro SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
