[build]
  command = "npm run build"
  publish = "dist"
  # Skip deploy if ONLY qb-sync.json changed — saves deploy credits
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':!public/data/qb-sync.json'"

# Internal apps — serve directly, bypass Astro catch-all
[[redirects]]
  from = "/worker"
  to = "/worker/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/receipt"
  to = "/receipt/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/track"
  to = "/track/index.html"
  status = 200
  force = true

# Astro SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
